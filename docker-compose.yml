name: tfb-pereroca

services:
  kali:
    build:
      context: ./serveis/kali
    container_name: kali
    tty: true
    stdin_open: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - attacker_net
      - dmz_net
    volumes:
      - ./scripts/atacs:/atacs
      - ./logs/atacs:/logs/atacs
    command: /bin/bash

  reverse-proxy:
    build:
      context: ./serveis/reverse-proxy
    container_name: reverse-proxy
    depends_on:
      - webapp
    ports:
      - "8080:80"
    volumes:
      - ./configs/nginx/apagat/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - dmz_net
      - monitoring_net
    restart: unless-stopped

  webapp:
    build:
      context: ./serveis/webapp
    container_name: webapp
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: tfbpere
      DB_USER: tfbpere
      DB_PASSWORD: tfbperepass
    volumes:
      - ./serveis/webapp/app:/var/www/html
      - ./logs/webapp:/var/log/apache2
    networks:
      - dmz_net
      - internal_net
      - monitoring_net
    restart: unless-stopped

  db:
    image: mariadb:11
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: tfbpere
      MYSQL_USER: tfbpere
      MYSQL_PASSWORD: tfbperepass
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - internal_net
    restart: unless-stopped

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./configs/suricata/suricata.yml:/etc/suricata/suricata.yaml:ro
      - ./configs/suricata/rules:/var/lib/suricata/rules:ro
      - ./logs/suricata:/var/log/suricata
    networks:
      - dmz_net
      - internal_net
      - monitoring_net
    command: >
      suricata -i eth0 -i eth1 -c /etc/suricata/suricata.yaml -v
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring_net
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki/loki-config.yml:/etc/loki/config.yml:ro
      - ./data/loki:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - monitoring_net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    volumes:
      - ./configs/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/project:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitoring_net
    restart: unless-stopped

  detector:
    image: alpine:latest
    container_name: detector
    volumes:
      - ./logs:/var/log/project
      - ./scripts:/scripts
    command: sh /scripts/detect_attack.sh
    networks:
      - monitoring_net
    restart: unless-stopped 

networks:
  attacker_net:
    driver: bridge

  dmz_net:
    driver: bridge

  internal_net:
    driver: bridge
    internal: true

  monitoring_net:
    driver: bridge